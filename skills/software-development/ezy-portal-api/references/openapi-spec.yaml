## Using with Code Generators

```bash
# Generate TypeScript client (openapi-generator)
openapi-generator generate -i ezy-portal-openapi.yaml -g typescript-axios -o ./client

# Generate Python client
openapi-generator generate -i ezy-portal-openapi.yaml -g python -o ./client

# Validate spec
swagger-codegen validate -i ezy-portal-openapi.yaml
```

